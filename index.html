<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Rands Wallet | Splash Screen</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body, html {
    height: 100%;
    font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
    background: linear-gradient(135deg, #E31B23, #8B0000, #FFFFFF);
    background-size: 200% 200%;
    animation: gradientShift 3s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .splash {
    text-align: center;
    animation: fadeInUp 0.8s ease-out;
    padding: 1rem;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 3D Flip Logo Container */
  .logo-3d {
    width: 130px;
    height: 130px;
    margin: 0 auto 20px;
    perspective: 1000px;
    cursor: pointer;
  }

  .flip-card {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1);
    transform-style: preserve-3d;
    border-radius: 50%;
  }

  .logo-3d:hover .flip-card {
    transform: rotateY(180deg);
  }

  .flip-front, .flip-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flip-front {
    background: linear-gradient(145deg, #ffffff, #f0f0f0);
    box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
    transform: rotateY(0deg);
  }

  .flip-front img {
    width: 75%;
    height: auto;
    object-fit: contain;
  }

  .flip-back {
    background: linear-gradient(145deg, #E30613, #8B0000);
    transform: rotateY(180deg);
    color: white;
    font-weight: bold;
    font-size: 1.2rem;
    flex-direction: column;
    gap: 5px;
    box-shadow: 0 20px 35px -10px rgba(227,6,19,0.4);
  }

  .flip-back i {
    font-size: 2rem;
  }

  /* Pulse Ring Animation */
  .pulse-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: transparent;
    pointer-events: none;
    z-index: -1;
  }

  .pulse-ring::before,
  .pulse-ring::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.4);
    animation: pulseRing 2s ease-out infinite;
  }

  .pulse-ring::after {
    animation-delay: 1s;
  }

  @keyframes pulseRing {
    0% { transform: scale(0.8); opacity: 0.8; }
    100% { transform: scale(1.5); opacity: 0; }
  }

  .splash h1 {
    font-size: 2.8rem;
    background: linear-gradient(135deg, #fff, #ffe0e0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: none;
    letter-spacing: -0.5px;
    font-weight: 800;
  }

  .version {
    margin-top: 16px;
    margin-bottom: 24px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.9);
    letter-spacing: 1px;
    font-weight: 500;
    text-transform: uppercase;
    background: rgba(255,255,255,0.15);
    display: inline-block;
    padding: 6px 20px;
    border-radius: 40px;
    backdrop-filter: blur(4px);
  }

  .loading-bar {
    width: 380px;
    height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 4px;
    overflow: hidden;
    margin: 0 auto;
  }

  .progress {
    width: 0;
    height: 100%;
    background: linear-gradient(90deg, #fff, #ffcccb);
    border-radius: 4px;
    transition: width 0.05s linear;
  }

  .loading-circle {
    margin-top: 20px;
    display: flex;
    justify-content: center;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top: 3px solid white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .status-message {
    margin-top: 20px;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.9);
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .pulse-dots { display: inline-flex; gap: 4px; }
  .pulse-dots span {
    width: 5px; height: 5px; background: white; border-radius: 50%;
    animation: pulseDot 1.4s infinite;
  }
  .pulse-dots span:nth-child(2) { animation-delay: 0.2s; }
  .pulse-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulseDot {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  .percentage {
    margin-top: 8px;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.6);
    font-family: monospace;
  }

  .tagline {
    margin-top: 24px;
    font-size: 1rem;
    color: rgba(255,255,255,0.9);
    font-weight: 500;
    animation: gentlePulse 2s ease-in-out infinite;
  }

  @keyframes gentlePulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
  }

  @media (max-width: 550px) {
    .splash h1 { font-size: 2.2rem; }
    .loading-bar { width: 280px; }
    .logo-3d { width: 100px; height: 100px; }
    .pulse-ring { width: 120px; height: 120px; }
  }
</style>
</head>
<body>
<div class="splash">
  <div class="logo-3d">
    <div class="flip-card">
      <div class="flip-front">
        <img src="images/rands-logo.png" alt="Rands Wallet" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23E30613\'/%3E%3Ctext x=\'50\' y=\'67\' font-size=\'45\' text-anchor=\'middle\' fill=\'white\'%3ER%3C/text%3E%3C/svg%3E'">
      </div>
      <div class="flip-back">
        <i class="fas fa-crown"></i>
        <span>RANDS</span>
        <small style="font-size: 10px;">Premium</small>
      </div>
    </div>
    <div class="pulse-ring"></div>
  </div>
  
  <h1>Rands Wallet</h1>
  <div class="version">✦ Secure Digital Wallet ✦</div>
  <div class="loading-bar"><div class="progress" id="progressFill"></div></div>
  <div class="loading-circle"><div class="spinner"></div></div>
  <div class="status-message" id="statusMessage"><span>✨ Initializing Wallet</span><span class="pulse-dots"><span>.</span><span>.</span><span>.</span></span></div>
  <div class="percentage" id="percentage">0%</div>
  <div class="tagline">#See Your Vibe</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
<script>
  const totalDuration = 10000;
  const progressFill = document.getElementById('progressFill');
  const statusElement = document.getElementById('statusMessage');
  const percentageElement = document.getElementById('percentage');
  let startTime = null;
  let hasRedirected = false;
  
  const messageStages = [
    { threshold: 0, text: "✨ Initializing Wallet" },
    { threshold: 15, text: "🔐 Verifying Security" },
    { threshold: 30, text: "💳 Loading Virtual Card" },
    { threshold: 45, text: "💰 Syncing Balance" },
    { threshold: 60, text: "🔗 Connecting to Blockchain" },
    { threshold: 75, text: "📱 Preparing Dashboard" },
    { threshold: 85, text: "✨ Almost Ready" },
    { threshold: 95, text: "🚀 Launching Rands Wallet" }
  ];
  
  function updateMessageContent(text) {
    const currentSpan = statusElement.querySelector('span:first-child');
    if (currentSpan && currentSpan.innerText !== text) {
      statusElement.innerHTML = `<span>${text}</span><span class="pulse-dots"><span>.</span><span>.</span><span>.</span></span>`;
    } else if (!currentSpan) {
      statusElement.innerHTML = `<span>${text}</span><span class="pulse-dots"><span>.</span><span>.</span><span>.</span></span>`;
    }
  }
  
  function updateStatus(progressPercent) {
    percentageElement.textContent = `${Math.floor(progressPercent)}%`;
    progressFill.style.width = `${progressPercent}%`;
    let currentMessage = messageStages[0].text;
    for (let i = messageStages.length - 1; i >= 0; i--) {
      if (progressPercent >= messageStages[i].threshold) {
        currentMessage = messageStages[i].text;
        break;
      }
    }
    updateMessageContent(currentMessage);
  }
  
  function redirectToWallet() {
    if (!hasRedirected) {
      hasRedirected = true;
      window.location.href = 'wallet.html';
    }
  }
  
  function animateProgress(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = timestamp - startTime;
    let progress = (elapsed / totalDuration) * 100;
    if (progress >= 100) {
      updateStatus(100);
      updateMessageContent("🚀 Welcome to Rands Wallet!");
      setTimeout(redirectToWallet, 300);
      return;
    }
    updateStatus(progress);
    requestAnimationFrame(animateProgress);
  }
  
  requestAnimationFrame(animateProgress);
  setTimeout(() => { if (!hasRedirected) redirectToWallet(); }, 11000);
</script>
</body>
</html>
